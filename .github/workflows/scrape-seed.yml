name: Seed Scrape (Full Harvest)

on:
  workflow_dispatch: # Manual trigger only

jobs:
  merrjep:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scrapy_project/requirements.txt
      - run: pip install -r scrapy_project/requirements.txt
      - name: Crawl merrjep (unlimited pages)
        working-directory: scrapy_project
        env:
          DATABASE_URL: ${{ secrets.SCRAPER_DATABASE_URL }}
        run: |
          python -m scrapy crawl merrjep \
            -s HTTPCACHE_ENABLED=False \
            -s LOG_LEVEL=INFO \
            -s MAX_PAGES=0 2>&1 | tee /tmp/merrjep.log
          count=$(grep -oP "'item_scraped_count': \K\d+" /tmp/merrjep.log || echo "0")
          echo "merrjep scraped $count items"

