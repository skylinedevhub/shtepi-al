name: Daily Scrape

on:
  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        spider: [merrjep, mirlir, celesi, duashpi, njoftime]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scrapy_project/requirements.txt

      - name: Install dependencies
        run: pip install -r scrapy_project/requirements.txt

      - name: "Crawl: ${{ matrix.spider }}"
        working-directory: scrapy_project
        env:
          DATABASE_URL: ${{ secrets.SCRAPER_DATABASE_URL }}
          SPIDER_NAME: ${{ matrix.spider }}
        run: |
          echo "Starting ${SPIDER_NAME} at $(date -u +%H:%M:%S)"

          python -m scrapy crawl "${SPIDER_NAME}" \
            -s HTTPCACHE_ENABLED=False \
            -s LOG_LEVEL=INFO 2>&1 | tee "/tmp/${SPIDER_NAME}.log"

          count=$(grep -oP "'item_scraped_count': \K\d+" "/tmp/${SPIDER_NAME}.log" || echo "0")
          reason=$(grep -oP "'finish_reason': '\K[^']+" "/tmp/${SPIDER_NAME}.log" || echo "unknown")

          echo "Result: $count items ($reason)"

          if [ "$reason" != "finished" ] && [ "$reason" != "closespider_itemcount" ]; then
            echo "::warning::Spider ${SPIDER_NAME} finished with: $reason"
          fi
