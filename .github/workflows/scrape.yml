name: Daily Scrape

on:
  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scrapy_project/requirements.txt

      - name: Install dependencies
        run: pip install -r scrapy_project/requirements.txt

      - name: Run spiders
        working-directory: scrapy_project
        env:
          DATABASE_URL: ${{ secrets.SCRAPER_DATABASE_URL }}
        run: |
          total=0
          failed_spiders=""

          for spider in merrjep mirlir celesi duashpi njoftime; do
            echo "::group::Spider: $spider"
            echo "Starting $spider at $(date -u +%H:%M:%S)"

            python -m scrapy crawl "$spider" \
              -s HTTPCACHE_ENABLED=False \
              -s LOG_LEVEL=INFO 2>&1 | tee "/tmp/${spider}.log"

            count=$(grep -oP "'item_scraped_count': \K\d+" "/tmp/${spider}.log" || echo "0")
            reason=$(grep -oP "'finish_reason': '\K[^']+" "/tmp/${spider}.log" || echo "unknown")

            echo "Result: $count items ($reason)"
            echo "::endgroup::"

            total=$((total + count))

            if [ "$reason" != "finished" ] && [ "$reason" != "closespider_itemcount" ]; then
              failed_spiders="$failed_spiders $spider"
            fi
          done

          echo ""
          echo "=== Summary ==="
          echo "Total items scraped: $total"

          if [ -n "$failed_spiders" ]; then
            echo "::warning::Spiders with issues:$failed_spiders"
          fi
