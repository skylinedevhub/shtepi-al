version: "3.8"

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    restart: unless-stopped

  scrapy:
    build:
      context: .
      dockerfile: docker/scrapy.Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: "no"
    profiles:
      - scrape
